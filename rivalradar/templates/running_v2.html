{% extends "base.html" %}

{% block title %}RivalRadar | Running Analysis{% endblock %}

{% block content %}
<section class="relative overflow-hidden rounded-3xl border border-white/10 bg-white/[0.03] p-8 shadow-[0_25px_80px_rgba(0,0,0,0.45)]">
  <div class="pointer-events-none absolute -left-20 -top-16 h-64 w-64 rounded-full bg-cyan-400/10 blur-3xl"></div>
  <div class="pointer-events-none absolute -right-20 -bottom-20 h-72 w-72 rounded-full bg-orange-400/10 blur-3xl"></div>

  <div class="relative z-10">
    <p class="text-xs uppercase tracking-[0.24em] text-cyan-200/80">Pipeline Running</p>
    <h1 class="mt-2 text-3xl font-extrabold text-white sm:text-4xl">Analyzing {{ company_names }}</h1>
    <p id="overallNote" class="mt-2 text-sm text-slate-300">Initializing agent pipeline...</p>

    <div class="mt-6 rounded-2xl border border-white/10 bg-slate-950/50 p-4">
      <div class="mb-2 flex items-center justify-between text-sm text-slate-300">
        <span>Overall Progress</span>
        <span id="overallPercent">0%</span>
      </div>
      <div class="h-3 overflow-hidden rounded-full bg-slate-800">
        <div id="overallFill" class="h-full w-0 rounded-full bg-gradient-to-r from-cyan-400 via-teal-300 to-emerald-300 transition-all duration-700"></div>
      </div>
    </div>

    <div id="agentGrid" class="mt-8 grid gap-4 md:grid-cols-2"></div>

    <div id="donePanel" class="mt-8 hidden rounded-2xl border border-emerald-300/30 bg-emerald-400/10 p-6">
      <p class="text-emerald-100">Analysis complete. Redirecting to report...</p>
    </div>
  </div>
</section>

<script>
  const companyNames = "{{ company_names }}";

  const AGENTS = [
    { id: '1', name: 'Agent 1', desc: 'Scraping competitor pricing and feature data', color: 'from-cyan-400 to-blue-300' },
    { id: '2', name: 'Agent 2', desc: 'Detecting vulnerabilities and weak signals', color: 'from-orange-400 to-amber-300' },
    { id: '3', name: 'Agent 3', desc: 'Predicting pricing and strategy changes', color: 'from-fuchsia-400 to-pink-300' },
    { id: '4', name: 'Agent 4', desc: 'Generating VC actions and priorities', color: 'from-emerald-400 to-lime-300' }
  ];

  const state = {
    active: null,
    done: new Set(),
    pct: 0,
    sessionId: null
  };

  function agentCard(agent, status = 'waiting', message = 'Queued') {
    const spinner = status === 'running'
      ? '<span class="inline-block h-3 w-3 animate-spin rounded-full border-2 border-white/40 border-t-white"></span>'
      : '';

    const badgeClass = status === 'done'
      ? 'bg-emerald-400/20 text-emerald-100 border-emerald-300/40'
      : status === 'running'
        ? 'bg-cyan-400/20 text-cyan-100 border-cyan-300/40'
        : 'bg-slate-700/60 text-slate-200 border-slate-500/40';

    const width = status === 'done' ? 100 : status === 'running' ? 62 : 8;

    return `
      <article class="rounded-2xl border border-white/10 bg-slate-950/55 p-5">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h3 class="text-lg font-bold text-white">${agent.name}</h3>
            <p class="mt-1 text-sm text-slate-300">${agent.desc}</p>
          </div>
          <span class="inline-flex items-center gap-2 rounded-full border px-3 py-1 text-xs font-semibold ${badgeClass}">
            ${spinner}${status.toUpperCase()}
          </span>
        </div>
        <p class="mt-3 text-sm text-slate-300">${message}</p>
        <div class="mt-3 h-2 overflow-hidden rounded-full bg-slate-800">
          <div class="h-full rounded-full bg-gradient-to-r ${agent.color} transition-all duration-700" style="width:${width}%"></div>
        </div>
      </article>
    `;
  }

  function renderAgents(messages = {}) {
    const html = AGENTS.map((agent) => {
      const status = state.done.has(agent.id)
        ? 'done'
        : state.active === agent.id
          ? 'running'
          : 'waiting';
      const msg = messages[agent.id] || (status === 'done' ? 'Completed successfully' : status === 'running' ? 'Working...' : 'Queued');
      return agentCard(agent, status, msg);
    }).join('');

    document.getElementById('agentGrid').innerHTML = html;
  }

  function setOverall(pct, note) {
    state.pct = Math.max(state.pct, pct);
    document.getElementById('overallFill').style.width = `${state.pct}%`;
    document.getElementById('overallPercent').textContent = `${Math.round(state.pct)}%`;
    if (note) document.getElementById('overallNote').textContent = note;
  }

  function handleEvent(data, messages) {
    if (data.stage === 'init') {
      setOverall(8, data.message);
    }

    if (data.stage === 'agent' && ['1', '2', '3', '4'].includes(data.agent)) {
      const id = data.agent;
      if (state.active && state.active !== id) state.done.add(state.active);
      state.active = id;
      messages[id] = data.message || 'Working...';
      const progressByAgent = { '1': 26, '2': 48, '3': 72, '4': 92 };
      setOverall(progressByAgent[id], data.message);
    }

    if (data.stage === 'success') {
      if (state.active) state.done.add(state.active);
      state.active = null;
      state.sessionId = data.session_id;
      setOverall(100, 'Pipeline complete. Preparing report...');
      document.getElementById('donePanel').classList.remove('hidden');
      renderAgents(messages);
      setTimeout(() => {
        window.location.href = `/results/${data.session_id}`;
      }, 900);
    }

    if (data.stage === 'error') {
      setOverall(state.pct, data.message || 'An error occurred while running analysis');
    }
  }

  function start() {
    const messages = {};
    renderAgents(messages);

    const streamUrl = `/stream/${encodeURIComponent(companyNames)}`;
    const es = new EventSource(streamUrl);

    es.onmessage = (event) => {
      const data = JSON.parse(event.data);
      handleEvent(data, messages);
      renderAgents(messages);
    };

    es.onerror = () => {
      es.close();
      setOverall(100, 'Connection ended. If not redirected, refresh the page.');
    };
  }

  start();
</script>
{% endblock %}
